<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider">
        <div class="slides">
            <img class="slide" src="images/IMG_20250131_132104_664.jpg" alt="Image #1">
            <img class="slide" src="images/IMG_20250301_095131_962.jpg" alt="Image #2">
            <img class="slide" src="images/IMG_20251108_212705_756.jpg" alt="Image #3">
        </div>
        <button id="prev" onclick="prevslide()">&#10094</button>
        <button id="next" onclick="nextslide()">&#10095</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
